<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1F3A"/>
      <stop offset="100%" style="stop-color:#1A3A5C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Inset border -->
  <rect x="18" y="18" width="476" height="476" rx="66" fill="none" stroke="#B8966E" stroke-width="1.5" opacity=".3"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#B8966E" stroke-width="1.2" opacity=".2"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="136" fill="none" stroke="#B8966E" stroke-width=".8" opacity=".12"/>

  <!-- Diagonal tick marks — intercardinal -->
  <line x1="370" y1="142" x2="352" y2="160" stroke="#B8966E" stroke-width="2" opacity=".35"/>
  <line x1="142" y1="142" x2="160" y2="160" stroke="#B8966E" stroke-width="2" opacity=".35"/>
  <line x1="370" y1="370" x2="352" y2="352" stroke="#B8966E" stroke-width="2" opacity=".35"/>
  <line x1="142" y1="370" x2="160" y2="352" stroke="#B8966E" stroke-width="2" opacity=".35"/>

  <!-- N point — gold, dominant -->
  <polygon points="256,48 272,216 256,184 240,216" fill="#B8966E"/>

  <!-- S point — warm white -->
  <polygon points="256,464 272,296 256,328 240,296" fill="#FAF8F4" opacity=".65"/>

  <!-- W point — warm white -->
  <polygon points="48,256 216,240 184,256 216,272" fill="#FAF8F4" opacity=".65"/>

  <!-- E point — warm white -->
  <polygon points="464,256 296,240 328,256 296,272" fill="#FAF8F4" opacity=".65"/>

  <!-- N label -->
  <text x="256" y="108" text-anchor="middle"
        font-family="'Montserrat', 'Helvetica Neue', sans-serif"
        font-size="40" font-weight="500"
        fill="#B8966E" letter-spacing="4" opacity=".9">N</text>

  <!-- Centre jewel -->
  <circle cx="256" cy="256" r="28" fill="#B8966E"/>
  <circle cx="256" cy="256" r="14" fill="#0B1F3A"/>
  <circle cx="256" cy="256" r="5" fill="#B8966E"/>
</svg>
