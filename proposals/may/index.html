<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--navy:#0B1F3A;--navy-mid:#112847;--gold:#B8966E;--gold-bright:#D4A96A;--warm-white:#FAF8F4;}
  html,body{height:100%;}
  body{
    background:var(--navy);
    color:var(--warm-white);
    font-family:'Montserrat',sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:absolute;inset:0;
    background-image:linear-gradient(rgba(184,150,110,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(184,150,110,.04) 1px,transparent 1px);
    background-size:40px 40px;
  }
  .gate{position:relative;z-index:2;width:100%;max-width:420px;text-align:center;}
  .brandmark{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:40px;}
  .lock{width:34px;height:34px;margin:0 auto 22px;opacity:.85;}
  .eyebrow{font-size:8px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
  h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:26px;line-height:1.25;color:var(--warm-white);margin-bottom:10px;}
  h1 em{font-style:italic;color:var(--gold);}
  .sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(250,248,244,.5);margin-bottom:30px;}
  form{display:flex;flex-direction:column;gap:12px;}
  .field{position:relative;}
  input[type=password]{
    width:100%;padding:14px 16px;background:rgba(250,248,244,.04);
    border:1px solid rgba(184,150,110,.35);color:var(--warm-white);
    font-family:'Montserrat',sans-serif;font-size:14px;letter-spacing:.04em;
    outline:none;transition:border-color .2s;text-align:center;
  }
  input[type=password]:focus{border-color:var(--gold);}
  input[type=password]::placeholder{color:rgba(250,248,244,.3);letter-spacing:.2em;}
  button{
    padding:14px 16px;background:var(--gold);border:none;color:var(--navy);
    font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;
    font-weight:600;cursor:pointer;transition:background .2s;
  }
  button:hover{background:var(--gold-bright);}
  button:disabled{opacity:.6;cursor:default;}
  .err{min-height:18px;margin-top:6px;font-size:11px;letter-spacing:.05em;color:#E0857A;}
  .foot{margin-top:38px;font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:rgba(250,248,244,.25);}
</style>

<script>
(function(){
  var D = JSON.parse(document.getElementById('payload').textContent);
  var form = document.getElementById('f');
  var pwEl = document.getElementById('pw');
  var btn = document.getElementById('btn');
  var err = document.getElementById('err');

  function b64ToBytes(b64){
    var bin = atob(b64);
    var out = new Uint8Array(bin.length);
    for (var i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  async function unlock(pw){
    var enc = new TextEncoder();
    var salt = b64ToBytes(D.salt);
    var iv = b64ToBytes(D.iv);
    var ct = b64ToBytes(D.ct);
    var baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:salt, iterations:D.iter, hash:'SHA-256'},
      baseKey,
      {name:'AES-GCM', length:256},
      false,
      ['decrypt']
    );
    var plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, key, ct);
    return new TextDecoder().decode(plainBuf);
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    err.textContent = '';
    var pw = pwEl.value;
    if(!pw){ return; }
    btn.disabled = true;
    btn.textContent = 'Unlocking\u2026';
    try{
      var html = await unlock(pw);
      document.open();
      document.write(html);
      document.close();
    }catch(ex){
      err.textContent = 'Incorrect passphrase. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Unlock Proposal';
      pwEl.value = '';
      pwEl.focus();
    }
  });
})();
</script>
